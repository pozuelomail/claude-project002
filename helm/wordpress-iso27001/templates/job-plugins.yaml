{{/*
job-plugins.yaml
Job que usa WP-CLI para instalar y configurar plugins ISO 27001
ISO 27001 A.12.6.1 / A.9 / A.14
Se ejecuta como Helm hook post-install y post-upgrade.
*/}}
{{- if .Values.plugins.install }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "wordpress-iso27001.fullname" . }}-plugins-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-iso27001.labels" . | nindent 4 }}
    app.kubernetes.io/component: wpcli-job
  annotations:
    # Ejecutar después de install y upgrade
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600   # Máximo 10 minutos
  template:
    metadata:
      labels:
        {{- include "wordpress-iso27001.labels" . | nindent 8 }}
        app.kubernetes.io/component: wpcli-job
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "wordpress-iso27001.serviceAccountName" . }}
      automountServiceAccountToken: false

      securityContext:
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33

      initContainers:
        # Espera a que WordPress esté operativo antes de usar WP-CLI
        - name: wait-for-wordpress
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que WordPress esté disponible..."
              SVC="{{ include "wordpress-iso27001.fullname" . }}"
              # nc (netcat) de BusyBox: verifica que el puerto 80 acepta conexiones TCP
              until nc -z "${SVC}" 80 2>/dev/null; do
                echo "WordPress aún no disponible en ${SVC}:80, reintentando en 10s..."
                sleep 10
              done
              echo "WordPress disponible en ${SVC}:80. Procediendo con WP-CLI."
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: wpcli
          image: wordpress:cli-php8.2
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsUser: 33
            runAsGroup: 33
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          env:
            - name: WORDPRESS_DB_HOST
              value: {{ include "wordpress-iso27001.mariadb.serviceName" . }}:3306
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-iso27001.mariadb.secretName" . }}
                  key: mariadb-database
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-iso27001.mariadb.secretName" . }}
                  key: mariadb-username
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-iso27001.mariadb.secretName" . }}
                  key: mariadb-password
            - name: WP_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-iso27001.wordpress.secretName" . }}
                  key: admin-user
            - name: WP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-iso27001.wordpress.secretName" . }}
                  key: admin-password
            - name: WP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-iso27001.wordpress.secretName" . }}
                  key: admin-email
            - name: WP_SITE_URL
              value: {{ include "wordpress-iso27001.siteUrl" . }}
            - name: WP_SITE_TITLE
              value: {{ .Values.site.title | quote }}

          command:
            - sh
            - -c
            - |
              set -e

              WP="wp --path=/var/www/html --allow-root"

              echo "============================================"
              echo "WP-CLI — Instalación y hardening ISO 27001"
              echo "============================================"

              # [1/4] Instalar WordPress si aún no está instalado en la BD
              echo "[1/4] Preparando WordPress con WP-CLI..."
              # La imagen wordpress:cli tiene WP-CLI pero no los ficheros de core.
              # Descargamos el core solo si no existe (para no sobreescribir una instalación existente).
              if [ ! -f /var/www/html/wp-login.php ]; then
                echo "Descargando WordPress core..."
                $WP core download \
                  --version={{ .Chart.AppVersion }} \
                  --locale={{ .Values.site.locale }} \
                  --skip-content \
                  --force
                echo "Core descargado."
              else
                echo "WordPress core ya presente en /var/www/html."
              fi

              # Crear wp-config.php si no existe
              if [ ! -f /var/www/html/wp-config.php ]; then
                echo "Creando wp-config.php..."
                $WP config create \
                  --dbname="${WORDPRESS_DB_NAME}" \
                  --dbuser="${WORDPRESS_DB_USER}" \
                  --dbpass="${WORDPRESS_DB_PASSWORD}" \
                  --dbhost="${WORDPRESS_DB_HOST}" \
                  --dbprefix="wp_" \
                  --skip-check
              fi

              # Instalar en la BD si aún no está
              if $WP core is-installed 2>/dev/null; then
                echo "WordPress ya instalado en BD. Actualizando URLs..."
                $WP option update siteurl "${WP_SITE_URL}"
                $WP option update home    "${WP_SITE_URL}"
              else
                echo "Primera instalación. Ejecutando wp core install..."
                $WP core install \
                  --url="${WP_SITE_URL}" \
                  --title="${WP_SITE_TITLE}" \
                  --admin_user="${WP_ADMIN_USER}" \
                  --admin_password="${WP_ADMIN_PASSWORD}" \
                  --admin_email="${WP_ADMIN_EMAIL}" \
                  --skip-email
                echo "WordPress instalado correctamente."
              fi

              echo "[2/4] Instalando plugins ISO 27001..."
              {{- range .Values.plugins.list }}
              echo "  -> Instalando {{ .name }} ({{ .slug }})..."
              wp --path=/var/www/html --allow-root plugin install {{ .slug }} --activate 2>/dev/null || \
                echo "  AVISO: No se pudo instalar {{ .slug }}, puede que ya exista."
              {{- end }}

              echo "[3/4] Configurando opciones de seguridad WordPress..."
              # Cerrar comentarios por defecto (A.9.4)
              $WP option update default_comment_status closed
              $WP option update default_ping_status closed
              $WP option update close_comments_for_old_posts 1
              $WP option update close_comments_days_old 0

              # Deshabilitar XML-RPC (vector de ataques frecuente)
              # (Se gestiona vía .htaccess y plugin Wordfence)

              # Forzar contraseñas fuertes
              $WP option update require_name_email 1

              # Ajustar permalinks (mejor seguridad en URLs)
              $WP rewrite structure '/%postname%/' --hard
              $WP rewrite flush --hard

              # Eliminar plugins y temas por defecto innecesarios
              $WP plugin delete hello 2>/dev/null || true
              $WP theme delete twentytwentyone 2>/dev/null || true
              $WP theme delete twentytwentytwo 2>/dev/null || true

              # Configurar locale
              $WP language core install {{ .Values.site.locale }} 2>/dev/null || true
              $WP language core activate {{ .Values.site.locale }} 2>/dev/null || true

              echo "[4/4] Verificando estado de plugins..."
              $WP plugin status

              echo "============================================"
              echo "Instalación y hardening completados."
              echo "============================================"

          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html/wp-content

      volumes:
        - name: wordpress-data
          {{- if .Values.persistence.wordpress.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "wordpress-iso27001.fullname" . }}-wordpress
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}

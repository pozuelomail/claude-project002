{{/*
secret-wordpress.yaml
Credenciales de WordPress y WordPress Security Keys — ISO 27001 A.10.1
Las claves se generan aleatoriamente y son estables en upgrades.
*/}}
{{- $secretName := include "wordpress-iso27001.wordpress.secretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}

{{- $adminPassword := "" }}
{{- $authKey := "" }}
{{- $secureAuthKey := "" }}
{{- $loggedInKey := "" }}
{{- $nonceKey := "" }}
{{- $authSalt := "" }}
{{- $secureAuthSalt := "" }}
{{- $loggedInSalt := "" }}
{{- $nonceSalt := "" }}

{{- if $existingSecret }}
  {{- $adminPassword   = b64dec (index $existingSecret.data "admin-password") }}
  {{- $authKey         = b64dec (index $existingSecret.data "auth-key") }}
  {{- $secureAuthKey   = b64dec (index $existingSecret.data "secure-auth-key") }}
  {{- $loggedInKey     = b64dec (index $existingSecret.data "logged-in-key") }}
  {{- $nonceKey        = b64dec (index $existingSecret.data "nonce-key") }}
  {{- $authSalt        = b64dec (index $existingSecret.data "auth-salt") }}
  {{- $secureAuthSalt  = b64dec (index $existingSecret.data "secure-auth-salt") }}
  {{- $loggedInSalt    = b64dec (index $existingSecret.data "logged-in-salt") }}
  {{- $nonceSalt       = b64dec (index $existingSecret.data "nonce-salt") }}
{{- else }}
  {{- $adminPassword   = randAlphaNum 24 }}
  {{- $authKey         = randAlphaNum 64 }}
  {{- $secureAuthKey   = randAlphaNum 64 }}
  {{- $loggedInKey     = randAlphaNum 64 }}
  {{- $nonceKey        = randAlphaNum 64 }}
  {{- $authSalt        = randAlphaNum 64 }}
  {{- $secureAuthSalt  = randAlphaNum 64 }}
  {{- $loggedInSalt    = randAlphaNum 64 }}
  {{- $nonceSalt       = randAlphaNum 64 }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-iso27001.labels" . | nindent 4 }}
  annotations:
    description: "Credenciales WordPress + Security Keys. Rotar periódicamente."
type: Opaque
data:
  admin-user: {{ .Values.site.adminUser | b64enc | quote }}
  admin-password: {{ $adminPassword | b64enc | quote }}
  admin-email: {{ .Values.site.adminEmail | b64enc | quote }}
  # WordPress Security Keys (ISO 27001 A.10.1.1)
  auth-key: {{ $authKey | b64enc | quote }}
  secure-auth-key: {{ $secureAuthKey | b64enc | quote }}
  logged-in-key: {{ $loggedInKey | b64enc | quote }}
  nonce-key: {{ $nonceKey | b64enc | quote }}
  auth-salt: {{ $authSalt | b64enc | quote }}
  secure-auth-salt: {{ $secureAuthSalt | b64enc | quote }}
  logged-in-salt: {{ $loggedInSalt | b64enc | quote }}
  nonce-salt: {{ $nonceSalt | b64enc | quote }}

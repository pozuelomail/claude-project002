{{/*
ingress.yaml
Ingress con TLS y cabeceras de seguridad — ISO 27001 A.10 / A.13
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wordpress-iso27001.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-iso27001.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.site.url }}
      secretName: {{ include "wordpress-iso27001.tls.secretName" . }}
  {{- end }}
  rules:
    - host: {{ .Values.site.url }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wordpress-iso27001.fullname" . }}
                port:
                  name: http
{{- end }}

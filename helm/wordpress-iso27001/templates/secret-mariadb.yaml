{{/*
secret-mariadb.yaml
Credenciales de MariaDB — ISO 27001 A.10.1 (Criptografía)
Las contraseñas se generan aleatoriamente en el primer deploy y
son estables gracias a la función `lookup` de Helm.
NUNCA incluir valores hardcodeados en este fichero.
*/}}
{{- $secretName := include "wordpress-iso27001.mariadb.secretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}

{{- $rootPassword := "" }}
{{- $userPassword := "" }}

{{- if $existingSecret }}
  {{- $rootPassword = b64dec (index $existingSecret.data "mariadb-root-password") }}
  {{- $userPassword = b64dec (index $existingSecret.data "mariadb-password") }}
{{- else }}
  {{- $rootPassword = randAlphaNum 32 }}
  {{- $userPassword = randAlphaNum 32 }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-iso27001.labels" . | nindent 4 }}
  annotations:
    # ISO 27001 A.10.1.1 — Política de uso de controles criptográficos
    description: "Credenciales MariaDB generadas aleatoriamente. Rotar según política."
type: Opaque
data:
  mariadb-root-password: {{ $rootPassword | b64enc | quote }}
  mariadb-password: {{ $userPassword | b64enc | quote }}
  mariadb-database: {{ .Values.mariadb.database | b64enc | quote }}
  mariadb-username: {{ .Values.mariadb.username | b64enc | quote }}
